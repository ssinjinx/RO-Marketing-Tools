{% extends "base.html" %}
{% block page_title %}Add Prospect{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Add Prospect</h1>
    <a href="{{ url_for('ro_profiles') }}" class="btn-secondary">Back</a>
</div>

<div class="form-card animate-fade-in-up">
    <form method="POST" action="{{ url_for('ro_profile_add') }}">
        <div class="form-group">
            <label>Business Name *</label>
            <input type="text" name="business_name" required placeholder="Acme Metal Works">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Industry</label>
                <input type="text" name="industry" placeholder="e.g. metal fabricator, brewery">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    {% for s in status_options %}
                        <option value="{{ s }}" {% if s == 'new' %}selected{% endif %}>
                            {{ s | replace('_', ' ') | title }}
                        </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" placeholder="(410) 555-1234">
            </div>
            <div class="form-group">
                <label>Website</label>
                <input type="text" name="website" placeholder="https://...">
            </div>
        </div>
        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address" placeholder="123 Main St, Baltimore, MD 21201">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" placeholder="Baltimore">
            </div>
            <div class="form-group">
                <label>State</label>
                <select name="state">
                    <option value="">— Select —</option>
                    {% for s in service_states %}
                        <option value="{{ s }}">{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>RO Products (leave blank to auto-match by industry)</label>
            <input type="text" name="ro_products" placeholder="CO2 cylinders, Nitrogen, ...">
        </div>
        <div class="form-group">
            <label>Suggested Contact Title (leave blank to auto-match)</label>
            <input type="text" name="suggested_contact_title" placeholder="Plant Manager">
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" placeholder="Any relevant notes..."></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Prospect</button>
            <a href="{{ url_for('ro_profiles') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
