{% extends "base.html" %}
{% block page_title %}Add Contact{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Add Contact</h1>
    <a href="{{ url_for('ro_contacts') }}" class="btn-secondary">Back</a>
</div>

<div class="form-card animate-fade-in-up">
    <form method="POST" action="{{ url_for('ro_contact_add') }}">
        <div class="form-group">
            <label>Linked Prospect</label>
            <select name="prospect_id">
                <option value="">— None —</option>
                {% for p in prospects %}
                    <option value="{{ p.id }}" {% if request.args.get('prospect_id') == p.id|string %}selected{% endif %}>
                        {{ p.business_name }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="Jane Smith">
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" placeholder="Plant Manager">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="jane@example.com">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" placeholder="(410) 555-1234">
            </div>
        </div>
        <div class="form-group">
            <label>LinkedIn URL</label>
            <input type="url" name="linkedin_url" placeholder="https://linkedin.com/in/...">
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes" placeholder="Any relevant notes..."></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Contact</button>
            <a href="{{ url_for('ro_contacts') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
