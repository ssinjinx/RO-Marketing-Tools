{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1>Edit Contact</h1>
    <a href="{{ url_for('ro_contacts') }}" class="btn-secondary">Back</a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('ro_contact_edit', contact_id=contact.id) }}">
        <div class="form-group">
            <label>Linked Prospect</label>
            <select name="prospect_id">
                <option value="">— None —</option>
                {% for p in prospects %}
                    <option value="{{ p.id }}" {% if contact.prospect_id == p.id %}selected{% endif %}>
                        {{ p.business_name }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" value="{{ contact.name or '' }}">
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" value="{{ contact.title or '' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ contact.email or '' }}">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" value="{{ contact.phone or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>LinkedIn URL</label>
            <input type="url" name="linkedin_url" value="{{ contact.linkedin_url or '' }}">
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea name="notes">{{ contact.notes or '' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Changes</button>
            <a href="{{ url_for('ro_contacts') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
