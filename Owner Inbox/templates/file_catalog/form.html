{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h1>{{ 'Edit File' if file else 'Add File' }}</h1>
    <a href="{{ url_for('files_list') }}" class="btn-secondary">Back</a>
</div>

<div class="form-card">
    <form method="post">
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required value="{{ file.name if file else '' }}">
        </div>
        <div class="form-group">
            <label for="file_path">File Path *</label>
            <input type="text" id="file_path" name="file_path" required value="{{ file.file_path if file else '' }}">
        </div>
        <div class="form-group">
            <label for="file_type">File Type</label>
            <input type="text" id="file_type" name="file_type" value="{{ file.file_type if file else '' }}" placeholder="e.g. PDF, DOCX, Image">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{ file.description if file else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="tags">Tags <span class="text-muted">(comma-separated)</span></label>
            <input type="text" id="tags" name="tags" value="{{ file.tags if file else '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">{{ 'Save Changes' if file else 'Add File' }}</button>
            <a href="{{ url_for('files_list') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
