{% extends 'base.html' %}
{% block page_title %}New Article{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ 'Edit Article' if article else 'New Article' }}</h1>
    <a href="{{ url_for('kb_list') }}" class="btn-secondary">Back</a>
</div>

<div class="form-card animate-fade-in-up">
    <form method="post">
        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required value="{{ article.title if article else '' }}">
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" value="{{ article.category if article else '' }}">
        </div>
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" class="textarea-lg">{{ article.content if article else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="tags">Tags <span class="text-muted">(comma-separated)</span></label>
            <input type="text" id="tags" name="tags" value="{{ article.tags if article else '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">{{ 'Save Changes' if article else 'Create Article' }}</button>
            <a href="{{ url_for('kb_list') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
