<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Inbox — Locked</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0c1a10;
    }
    .lock-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid #1a3a20;
      border-radius: 14px;
      padding: 48px 40px;
      text-align: center;
      width: 320px;
      position: relative;
      overflow: hidden;
    }
    .lock-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #2ecc71, transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100%{opacity:0} 50%{opacity:1} }
    .lock-icon { font-size: 40px; margin-bottom: 14px; }
    .lock-box h1 {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 6px;
      color: #f0fff4;
    }
    .lock-box p { color: #5a8a6a; margin-bottom: 24px; font-size: 0.78rem; }
    .lock-box input[type=password] {
      width: 100%;
      padding: 12px 16px;
      font-size: 1.4rem;
      letter-spacing: 10px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid #1a3a20;
      border-radius: 8px;
      color: #f0fff4;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .lock-box input[type=password]:focus {
      border-color: #1a5c35;
      box-shadow: 0 0 0 3px rgba(26,92,53,0.2);
    }
    .lock-box button {
      width: 100%;
      padding: 11px;
      background: #1a5c35;
      color: #f0fff4;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .lock-box button:hover {
      background: #225f3a;
      box-shadow: 0 0 16px rgba(26,92,53,0.5);
    }
    .error { color: #f08080; font-size: 0.78rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <h1>Owner Inbox</h1>
    <p>Enter your PIN to continue</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="/unlock">
      <input type="password" name="pin" placeholder="••••" maxlength="10" autofocus>
      <button type="submit">Unlock</button>
    </form>
  </div>
</body>
</html>
