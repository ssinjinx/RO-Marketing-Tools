{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h1>{{ 'Edit Task' if task else 'New Task' }} — {{ project.name }}</h1>
    <a href="{{ url_for('projects_view', id=project.id) }}" class="btn-secondary">Back</a>
</div>

<div class="form-card">
    <form method="post">
        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required value="{{ task.title if task else '' }}">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{ task.description if task else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="assigned_to">Assigned To</label>
            <input type="text" id="assigned_to" name="assigned_to" value="{{ task.assigned_to if task else '' }}">
        </div>
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status">
                {% for s in ['todo', 'in-progress', 'done'] %}
                <option value="{{ s }}" {% if task and task.status == s %}selected{% elif not task and s == 'todo' %}selected{% endif %}>
                    {{ s|capitalize }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority" name="priority">
                {% for p in ['low', 'medium', 'high'] %}
                <option value="{{ p }}" {% if task and task.priority == p %}selected{% elif not task and p == 'medium' %}selected{% endif %}>
                    {{ p|capitalize }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="due_date">Due Date</label>
            <input type="date" id="due_date" name="due_date" value="{{ task.due_date if task and task.due_date else '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">{{ 'Save Changes' if task else 'Create Task' }}</button>
            <a href="{{ url_for('projects_view', id=project.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
