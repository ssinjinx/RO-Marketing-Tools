<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO Leads{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
    <a href="{{ url_for('ro_info') }}" class="nav-brand">RO Leads</a>
    <a href="{{ url_for('ro_info') }}" {% if active == 'ro_info' %}class="active"{% endif %}>Roberts Oxygen</a>
    <a href="{{ url_for('search') }}" {% if active == 'search' %}class="active"{% endif %}>Prospect Search</a>
    <a href="{{ url_for('profiles') }}" {% if active == 'profiles' %}class="active"{% endif %}>Customer Profiles</a>
    <a href="{{ url_for('contacts') }}" {% if active == 'contacts' %}class="active"{% endif %}>Contacts</a>
    <a href="{{ url_for('pipeline') }}" {% if active == 'pipeline' %}class="active"{% endif %}>Pipeline</a>
</nav>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>
</body>
</html>
